syntax = "proto3";

package rti;

message RequestShowFillHistory
	{                                
	int32     template_id      = 154467;
	repeated string    user_msg         = 132760;

	string    fcm_id           = 154013;
	string    ib_id            = 154014;
	string    account_id       = 154008;
	
	string    index_format     = 120001;	// ssboe or trade_date
	int32     start_index      = 153002;	// seconds since begin of epoch or CCYYMMDD
	int32     finish_index     = 153003;	// seconds since begin of epoch or CCYYMMDD

	int32     max_record_count = 154020;	// optional, but if specified the count MUST be <= 10000
	}
