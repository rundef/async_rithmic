syntax = "proto3";

package rti;

message ResponseLoginInfo
	{       
	enum UserType {
		      USER_TYPE_ADMIN  = 0;
	              USER_TYPE_FCM    = 1;
		      USER_TYPE_IB     = 2;
		      USER_TYPE_TRADER = 3;
	              }

	int32    template_id           = 154467;
	repeated string   user_msg              = 132760;
	repeated string   rp_code               = 132766;

	string   fcm_id                = 154013;
	string   ib_id                 = 154014;
	string   user                  = 131003;
	
	string   first_name            = 154216;
	string   last_name             = 154217;
	string   email_address         = 150110;
	UserType user_type             = 154036;

	string   order_copy_status     = 158206;	        // enabled or disabled

	string   country_code          = 154712;
	string   state_code            = 154713;

	string   address_street_1      = 144511;
	string   address_street_2      = 144512;
	string   address_city          = 144513;
	string   address_state         = 144514;
	string   address_country       = 144515;
	string   address_zip           = 144519;

	string   phone_residence       = 144516;
	string   phone_work            = 144517;
	string   phone_mobile          = 144518;

	int32    tp_max_session_count  = 140000;               // ticker_plant (market data) max session count
	int32    op_max_session_count  = 140012;               // order_plant max session count
	}
